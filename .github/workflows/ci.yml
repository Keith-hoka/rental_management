name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: rental
          POSTGRES_PASSWORD: rental
          POSTGRES_DB: rental_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rental"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
      - run: uv sync
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run pytest -v
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://rental:rental@localhost:5432/rental_test

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: rental
          POSTGRES_PASSWORD: rental
          POSTGRES_DB: rental
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rental"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install backend
        working-directory: backend
        run: uv sync
      - name: Install frontend
        working-directory: frontend
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Run e2e tests
        env:
          DATABASE_URL: postgresql+asyncpg://rental:rental@localhost:5432/rental
        run: |
          cd backend
          uv run alembic upgrade head
          uv run uvicorn app.main:app --port 8000 &
          backend_pid=$!
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/health && break
            sleep 1
          done
          cd ../frontend
          set +e
          npm run test:e2e
          e2e_exit=$?
          set -e
          # Stop the backend so no orphan uv process holds the cache during
          # the setup-uv post-run cache prune (would fail the job otherwise).
          kill "$backend_pid" 2>/dev/null || true
          pkill -f "uvicorn app.main:app" 2>/dev/null || true
          exit $e2e_exit
      - name: Upload e2e artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-artifacts
          path: |
            frontend/test-results
            frontend/playwright-report
          retention-days: 5
